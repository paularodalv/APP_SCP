<!DOCTYPE html>
<html>

    <style>
        /* Reset básico */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Fondo general */
body {
    background-color: #f5f6fa;
    color: #333;
    line-height: 1.6;
    min-height: 100vh;
}

/* Contenedor principal */
.container {
    width: 90%;
    max-width: 800px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Encabezados */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2f3640;
}

/* Formularios */
form {
    display: flex;
    flex-direction: column;
}

input[type="text"],
input[type="password"],
textarea {
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #dcdde1;
    font-size: 1rem;
    transition: 0.3s;
}

input[type="text"]:focus,
input[type="password"]:focus,
textarea:focus {
    outline: none;
    border-color: #718093;
    box-shadow: 0 0 5px rgba(113, 128, 147, 0.5);
}

textarea {
    resize: vertical;
    min-height: 80px;
}

/* Botones */
button {
    background-color: #00a8ff;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #0097e6;
}

/* Enlaces */
a {
    color: #00a8ff;
    text-decoration: none;
    text-align: center;
    display: block;
    margin-top: 10px;
}

a:hover {
    text-decoration: underline;
}

/* Muro de mensajes */
#posts {
    margin-top: 30px;
}

.post {
    background-color: #f1f2f6;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    border-left: 5px solid #00a8ff;
}

.post b {
    color: #2f3640;
}

/* Responsive */
@media (max-width: 600px) {
    .container {
        padding: 20px;
    }

    input[type="text"],
    input[type="password"],
    textarea,
    button {
        font-size: 0.9rem;
    }
}
    </style>
    
    <head>
        <title>Login</title>
    </head>
    <body>
        <h2>Login</h2>

        <form action="/login" method="POST">
            <input name="username" placeholder="usuario" required>
            <br><br>
            <input type="password" name="password" placeholder="contraseña" required>
            <br><br>
            <button type="submit">Entrar</button>
        </form>
    <a href="/register.html">Registrarse</a>
    </body>
</html>
